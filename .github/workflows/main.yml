name: Windows 10 VPS với Tailscale

on:
  workflow_dispatch: # Bấm nút "Run workflow" thủ công trên web để chạy

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kiểm tra cấu hình phần cứng
        run: |
          echo "=== Thông số CPU và RAM từ GitHub ==="
          lscpu | grep "Model name"
          free -h
          
      - name: Cài đặt và cấu hình Tailscale VPN
        run: |
          # SỬA LỖI: Đường dẫn script cài đặt chính xác của Tailscale
          curl -fsSL https://tailscale.com | sh
          
          # Khởi động dịch vụ mạng ảo Tailscale
          sudo tailscaled --tun=userspace-networking &
          sleep 5
          
          # Đăng nhập tự động bằng Auth Key bí mật
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=github-win10-vps

      - name: Khởi động Windows 10 Docker (Cấu hình tối ưu)
        run: |
          echo "=== Đang tải và tạo máy ảo Windows 10 ==="
          # Chạy Docker giả lập với 2 Core CPU và 4.5GB RAM
          docker run -it -d \
            --name windows10 \
            --device=/dev/kvm \
            --cap-add=NET_ADMIN \
            -p 8006:8006 \
            -p 3389:3389 \
            -e RAM_SIZE="4.5G" \
            -e CPU_CORES="2" \
            -e VERSION="win10" \
            dockurr/windows
            
          echo "=== Chờ hệ thống khởi động ngầm ==="
          sleep 30

      - name: Duy trì VPS hoạt động liên tục
        run: |
          echo "=== VPS Windows 10 đã sẵn sàng! ==="
          echo "Mở Remote Desktop trên máy tính và nhập IP Tailscale để kết nối."
          
          # Vòng lặp giữ máy chạy liên tục trong 6 tiếng (Giới hạn tối đa của GitHub)
          for i in {1..360}; do
            echo "VPS hoạt động bình thường... Phút thứ: $i/360"
            sleep 60
          done
